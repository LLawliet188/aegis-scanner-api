name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate backend imports
        run: python -m compileall app tests

      - name: Run backend unit tests
        env:
          AEGIS_SCAN_ENGINE: mock
          AEGIS_ALLOWED_TARGET_MODE: private
          ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
        run: python -m pytest tests/ --ignore=tests/load -v

      - name: Run load + resilience tests
        env:
          AEGIS_SCAN_ENGINE: mock
          AEGIS_ALLOWED_TARGET_MODE: private
          ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
        run: python -m pytest tests/load/ -v --tb=short

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:8000/v1
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:8000/v1
        run: npm run build

  docker:
    name: Docker Runtime
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker stack
        run: docker compose build

      - name: Start Docker stack
        run: docker compose up -d

      - name: Validate health endpoint through nginx
        run: |
          for attempt in {1..40}; do
            if curl -fsS http://localhost:8000/v1/health; then
              exit 0
            fi
            docker compose ps
            sleep 3
          done
          docker compose logs
          exit 1

      - name: Validate metrics endpoint through nginx
        run: curl -fsS http://localhost:8000/v1/metrics | python3 -c "import json,sys; d=json.load(sys.stdin); assert 'uptime_seconds' in d, d"

      - name: Validate Prometheus metrics endpoint through nginx
        run: curl -fsS -H "Accept: text/plain" http://localhost:8000/v1/metrics | grep "aegis_uptime_seconds"

      - name: Validate detailed health endpoint through nginx
        run: curl -fsS http://localhost:8000/v1/health/detailed | python3 -c "import json,sys; d=json.load(sys.stdin); assert 'memory' in d, d"

      - name: Validate WebSocket route through nginx
        run: |
          python -m pip install --upgrade pip
          python -m pip install websockets
          python - <<'PY'
          import asyncio
          import json
          import websockets
          from websockets.exceptions import ConnectionClosedError

          async def main():
              try:
                  async with websockets.connect("ws://localhost:8000/v1/ws/scan/not-found") as websocket:
                      message = await websocket.recv()
                      payload = json.loads(message)
                      assert payload["type"] == "error"
                      assert payload["message"] == "Scan not found."
              except ConnectionClosedError as exc:
                  if exc.code != 1008:
                      raise

          asyncio.run(main())
          PY

      - name: Validate X-Request-ID header is echoed
        run: |
          RESPONSE=$(curl -fsS -D - http://localhost:8000/v1/health)
          echo "$RESPONSE" | grep -i "x-request-id"

      - name: Validate CORS preflight from allowed origin
        run: |
          # Must return 200 with Access-Control-Allow-Origin echoed back
          STATUS=$(curl -so /dev/null -w "%{http_code}" -X OPTIONS http://localhost:8000/v1/scan \
            -H "Origin: http://localhost:8000" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: content-type")
          if [ "$STATUS" != "200" ]; then
            echo "CORS preflight from allowed origin returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          ACAO=$(curl -sI -X OPTIONS http://localhost:8000/v1/scan \
            -H "Origin: http://localhost:8000" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: content-type" | grep -i "access-control-allow-origin")
          echo "CORS header: $ACAO"
          echo "$ACAO" | grep -qi "localhost:8000"

      - name: Validate CORS preflight from disallowed origin is blocked
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" -X OPTIONS http://localhost:8000/v1/scan \
            -H "Origin: https://evil.example.com" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: content-type")
          # Disallowed origins must not receive 200; FastAPI returns 400
          if [ "$STATUS" = "200" ]; then
            echo "CORS preflight from evil.example.com was NOT blocked (HTTP $STATUS)"
            exit 1
          fi
          echo "Disallowed origin correctly rejected with HTTP $STATUS"

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v
