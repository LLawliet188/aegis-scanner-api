name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate backend imports
        run: python -m compileall app tests

      - name: Run backend tests
        env:
          AEGIS_SCAN_ENGINE: mock
          AEGIS_ALLOWED_TARGET_MODE: private
          ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
        run: python -m pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:8000/v1
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:8000/v1
        run: npm run build

  docker:
    name: Docker Runtime
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker stack
        run: docker compose build

      - name: Start Docker stack
        run: docker compose up -d

      - name: Validate health endpoint through nginx
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://localhost:8000/v1/health; then
              exit 0
            fi
            docker compose ps
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Validate WebSocket route through nginx
        run: |
          python -m pip install --upgrade pip
          python -m pip install websockets
          python - <<'PY'
          import asyncio
          import json
          import websockets
          from websockets.exceptions import ConnectionClosedError

          async def main():
              try:
                  async with websockets.connect("ws://localhost:8000/v1/ws/scan/not-found") as websocket:
                      message = await websocket.recv()
                      payload = json.loads(message)
                      assert payload["type"] == "error"
                      assert payload["message"] == "Scan not found."
              except ConnectionClosedError as exc:
                  if exc.code != 1008:
                      raise

          asyncio.run(main())
          PY

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v
