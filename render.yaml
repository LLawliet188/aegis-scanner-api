# Render deployment configuration for the FastAPI backend.
# Public demo scans run with the mock engine to avoid cloud scanning restrictions.

services:
  - type: web
    name: aegis-scanner-backend
    runtime: docker
    plan: free
    repo: https://github.com/LLawliet188/aegis-scanner-api
    branch: main
    autoDeployTrigger: checksPass
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /v1/health
    envVars:
      - key: ENV_MODE
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: AEGIS_SCAN_ENGINE
        value: mock
      - key: AEGIS_ALLOWED_TARGET_MODE
        value: private
      - key: AEGIS_MAX_SCAN_HOSTS
        value: "16"
      - key: AEGIS_NMAP_PATH
        value: /usr/bin/nmap
      - key: AEGIS_ENABLE_OS_DETECTION
        value: "false"
      - key: AEGIS_ENABLE_VULN_SCRIPTS
        value: "false"
      - key: ALLOWED_ORIGINS
        value: https://aegis-scanner-api.vercel.app
