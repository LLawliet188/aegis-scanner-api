services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis-scanner-backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      ENV_MODE: ${ENV_MODE:-docker}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AEGIS_HOST: 0.0.0.0
      AEGIS_PORT: 8000
      AEGIS_SCAN_ENGINE: ${AEGIS_SCAN_ENGINE:-nmap}
      AEGIS_ALLOWED_TARGET_MODE: ${AEGIS_ALLOWED_TARGET_MODE:-private}
      AEGIS_MAX_SCAN_HOSTS: ${AEGIS_MAX_SCAN_HOSTS:-16}
      AEGIS_NMAP_PATH: ${AEGIS_NMAP_PATH:-/usr/bin/nmap}
      AEGIS_ENABLE_OS_DETECTION: ${AEGIS_ENABLE_OS_DETECTION:-false}
      AEGIS_ENABLE_VULN_SCRIPTS: ${AEGIS_ENABLE_VULN_SCRIPTS:-false}
      AEGIS_LOCAL_HOSTNAMES: ${AEGIS_LOCAL_HOSTNAMES:-localhost,host.docker.internal}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aegis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/v1}
    container_name: aegis-scanner-frontend
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - aegis

  nginx:
    image: nginx:1.27-alpine
    container_name: aegis-scanner-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - aegis

networks:
  aegis:
    driver: bridge
